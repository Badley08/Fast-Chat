<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1EA7FF">

    <title>Fast-Chat Pro</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Agora Web SDK -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="js/AppStyles.css">
</head>
<body class="theme-dark">

<!-- Splash Screen (Optional, skipped for speed or built in JS) -->

<!-- AUTH SCREEN -->
<div id="authScreen" class="auth-screen hidden">
    <div class="auth-container">
        <h1 class="auth-title"><i class="fa-solid fa-bolt text-primary"></i> Fast-Chat Pro</h1>
        
        <div id="authTabs" style="display:flex; justify-content:space-around; margin-bottom: 20px;">
            <button class="btn-icon active" data-mode="email" title="Email"><i class="fa-solid fa-envelope"></i></button>
            <button class="btn-icon" data-mode="phone" title="Téléphone"><i class="fa-solid fa-phone"></i></button>
            <button class="btn-icon" data-mode="google" title="Google"><i class="fa-brands fa-google"></i></button>
            <button class="btn-icon" data-mode="anon" title="Anonyme"><i class="fa-solid fa-user-secret"></i></button>
        </div>

        <!-- Forms will be toggled by JS -->
        <div id="authForms">
            <!-- Email Form -->
            <form id="emailForm" class="auth-box">
                <input type="text" id="emailName" placeholder="Nom d'utilisateur (Inscription)" class="auth-input">
                <input type="email" id="emailInput" placeholder="Email" required class="auth-input">
                <input type="password" id="passwordInput" placeholder="Mot de passe" required class="auth-input">
                <div class="color-swatches" id="emailColors"></div>
                <button type="submit" class="btn-primary" id="emailBtn">Se Connecter / S'inscrire</button>
            </form>

            <!-- Phone Form -->
            <form id="phoneForm" class="auth-box hidden">
                <input type="text" id="phoneName" placeholder="Nom d'utilisateur" class="auth-input">
                <input type="tel" id="phoneInput" placeholder="+1 (809) 123-4567" required class="auth-input">
                <div class="color-swatches" id="phoneColors"></div>
                <button type="submit" class="btn-primary" id="phoneBtn">Envoyer le code</button>
                <div id="recaptcha-container"></div>
            </form>

            <!-- Phone Verify -->
            <form id="phoneVerifyForm" class="auth-box hidden">
                <input type="text" id="verifyCodeInput" placeholder="Code SMS" required class="auth-input">
                <button type="submit" class="btn-primary" id="verifyBtn">Vérifier</button>
            </form>

            <!-- Google Form -->
            <div id="googleForm" class="auth-box hidden">
                <input type="text" id="googleName" placeholder="Nom d'utilisateur" class="auth-input">
                <div class="color-swatches" id="googleColors"></div>
                <button id="googleBtn" class="btn-primary" style="background:#DB4437;"><i class="fa-brands fa-google"></i> Continuer avec Google</button>
            </div>

            <!-- Anon Form -->
            <form id="anonForm" class="auth-box hidden">
                <input type="text" id="anonName" placeholder="Pseudonyme" required class="auth-input">
                <div class="color-swatches" id="anonColors"></div>
                <button type="submit" class="btn-primary" id="anonBtn"><i class="fa-solid fa-user-secret"></i> Chat Anonyme</button>
            </form>
        </div>
        
        <div style="margin-top:20px; text-align:center;">
            <button id="themeToggleAuth" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
    <!-- Navbar (WhatsApp style) -->
    <nav class="navbar">
        <div class="nav-item active" data-tab="chats" title="Discussions"><i class="fa-solid fa-message"></i></div>
        <div class="nav-item" data-tab="groups" title="Groupes"><i class="fa-solid fa-users"></i></div>
        <div class="nav-item nav-bottom" data-tab="settings" title="Paramètres"><i class="fa-solid fa-gear"></i></div>
    </nav>

    <!-- Sidebar Panel -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span id="sidebarTitle">Discussions</span>
            <button class="btn-icon" id="newActionBtn" style="float:right;"><i class="fa-solid fa-plus"></i></button>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Rechercher...">
        </div>
        <div class="chat-list" id="chatList">
            <!-- Chat items injected here -->
        </div>
    </aside>

    <!-- Conversation Panel -->
    <main class="conversation" id="conversation">
        <!-- Empty State -->
        <div id="emptyConvo" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-muted);">
            <i class="fa-regular fa-comments" style="font-size: 60px; margin-bottom: 20px;"></i>
            <h2>Sélectionnez une discussion</h2>
        </div>

        <!-- Active Chat -->
        <div id="activeConvo" class="hidden" style="display:flex; flex-direction:column; height:100%;">
            <header class="convo-header">
                <i class="fa-solid fa-arrow-left btn-back" id="backBtn"></i>
                <div class="chat-avatar" id="convoAvatar" style="background:var(--primary);"><i class="fa-solid fa-user"></i></div>
                <div style="flex-grow:1;">
                    <div id="convoName" style="font-weight:600; font-size:16px;">Nom</div>
                    <div id="convoStatus" class="convo-header-status">...</div>
                </div>
                <!-- Call Buttons -->
                <button class="btn-icon" id="audioCallBtn" title="Appel Audio"><i class="fa-solid fa-phone"></i></button>
                <button class="btn-icon" id="videoCallBtn" title="Appel Vidéo"><i class="fa-solid fa-video"></i></button>
                <button class="btn-icon" id="convoMenuBtn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            </header>

            <div class="messages-area" id="messagesArea">
                <!-- Messages injected here -->
            </div>
            
            <div id="typingIndicator" class="typing-info hidden">Quelqu'un écrit...</div>

            <!-- Input Area -->
            <div class="input-area">
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <button class="btn-icon" id="attachBtn" title="Envoyer une image"><i class="fa-solid fa-paperclip"></i></button>
                <input type="text" id="messageInput" placeholder="Écrire un message...">
                <button class="btn-send" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<!-- MODALS -->

<!-- Settings Modal -->
<div id="settingsModal" class="modal hidden">
    <div class="modal-content">
        <span class="modal-close" onclick="document.getElementById('settingsModal').classList.add('hidden')"><i class="fa-solid fa-xmark"></i></span>
        <h2 class="modal-title">Paramètres</h2>
        
        <div style="display:flex; align-items:center; gap: 15px; margin-bottom: 20px;">
            <div class="chat-avatar" id="settingsAvatar" style="width:60px; height:60px; font-size:24px;"></div>
            <div>
                <strong id="settingsUsername" style="font-size:18px;"></strong>
                <div id="settingsEmail" style="color:var(--text-muted); font-size:14px;"></div>
            </div>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label>Couleur:</label>
            <div class="color-swatches" id="settingsColors"></div>
        </div>
        
        <div style="margin-bottom: 20px;">
            <label>Icône:</label>
            <div class="icon-swatches" id="settingsIcons"></div>
        </div>

        <div style="margin-bottom: 20px;">
            <button class="btn-primary" id="linkAccountBtn" style="background:#10B981; margin-bottom:10px;"><i class="fa-brands fa-google"></i> Lier un compte Google</button>
            <button class="btn-primary" id="logoutBtn" style="background:var(--bg-panel); color:var(--text-main); border:1px solid var(--border-color);"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
        </div>
    </div>
</div>

<!-- New Group Modal -->
<div id="groupModal" class="modal hidden">
    <div class="modal-content">
        <span class="modal-close" onclick="document.getElementById('groupModal').classList.add('hidden')"><i class="fa-solid fa-xmark"></i></span>
        <h2 class="modal-title" id="groupModalTitle">Nouveau Groupe</h2>
        <input type="text" id="groupNameInput" placeholder="Nom du groupe" class="auth-input">
        <div id="groupError" style="color:#EF4444; font-size:12px; margin-bottom:10px;"></div>
        <button class="btn-primary" id="createGroupBtn">Créer / Rejoindre</button>
    </div>
</div>

<!-- Call UI Modal -->
<div id="callModal" class="modal hidden" style="background: #000;">
    <div style="width:100%; height:100%; display:flex; flex-direction:column; position:relative;">
        <div id="remoteVideo" style="flex-grow:1; background:#111; display:flex; align-items:center; justify-content:center; color:white;">
            En attente de l'interlocuteur...
        </div>
        <div id="localVideo" style="position:absolute; bottom:100px; right:20px; width:120px; height:160px; background:#333; border-radius:10px; overflow:hidden; border:2px solid var(--primary);"></div>
        
        <div style="height:80px; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; gap:30px;">
            <button class="btn-send" style="background:#EF4444; width:50px; height:50px;" id="endCallBtn"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>
</div>

<div id="toastContainer" style="position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px;"></div>

<!-- Audio -->
<audio id="receiveSound" src="receive.mp3" preload="auto"></audio>

<!-- Main App Logic -->
<script type="module" src="js/app.js"></script>

</body>
</html>
